<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rápido - Toggle Forms</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .form-box {
            display: none;
            padding: 1.5rem;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease-in-out;
        }
        
        .form-box.active {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-box h2 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .toggle-text {
            text-align: center;
            margin-top: 1rem;
            color: #666;
            font-size: 0.95rem;
        }
        
        .toggle-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .toggle-text a:hover {
            text-decoration: underline;
        }
        
        .debug-info {
            background-color: #f0f0f0;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1.5rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: #333;
        }
        
        .status {
            margin: 0.5rem 0;
        }
        
        .status.ok {
            color: green;
        }
        
        .status.error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test: Toggle Forms</h1>
        
        <div class="form-box active" id="loginForm">
            <h2>Iniciar Sesión (TEST)</h2>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginEmail">Correo Electrónico</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="Contraseña">
                </div>
                <button type="button" class="btn" onclick="testToggle()">Probar Toggle</button>
            </form>
            <p class="toggle-text">¿No tienes cuenta? <a href="javascript:void(0)" onclick="toggleForms(); return false;">Regístrate aquí</a></p>
        </div>

        <div class="form-box" id="registerForm">
            <h2>Crear Cuenta (TEST)</h2>
            <form id="registerFormElement">
                <div class="form-group">
                    <label for="registerUsername">Nombre de Usuario</label>
                    <input type="text" id="registerUsername" placeholder="Tu nombre de usuario">
                </div>
                <div class="form-group">
                    <label for="registerEmail">Correo Electrónico</label>
                    <input type="email" id="registerEmail" placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Contraseña</label>
                    <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres">
                </div>
                <button type="button" class="btn" onclick="testToggle()">Probar Toggle</button>
            </form>
            <p class="toggle-text">¿Ya tienes cuenta? <a href="javascript:void(0)" onclick="toggleForms(); return false;">Inicia sesión aquí</a></p>
        </div>

        <div class="debug-info">
            <h3>📊 Estado del Sistema</h3>
            <div class="status" id="status-dom">Verificando DOM...</div>
            <div class="status" id="status-functions">Verificando funciones...</div>
            <div class="status" id="status-forms">Verificando formularios...</div>
        </div>
    </div>

    <script>
        function toggleForms() {
            console.log('🔄 toggleForms ejecutada');
            
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            console.log('loginForm:', loginForm);
            console.log('registerForm:', registerForm);
            
            if (loginForm && registerForm) {
                loginForm.classList.toggle('active');
                registerForm.classList.toggle('active');

                console.log('✓ Clases toggleadas correctamente');
                console.log('loginForm.active:', loginForm.classList.contains('active'));
                console.log('registerForm.active:', registerForm.classList.contains('active'));

                // Clear forms
                document.getElementById('loginFormElement').reset();
                document.getElementById('registerFormElement').reset();
            } else {
                console.error('❌ Error: No se encontraron los formularios');
            }
        }

        function testToggle() {
            console.log('Botón de prueba presionado');
            toggleForms();
        }

        function checkStatus() {
            // DOM
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const statusDOM = document.getElementById('status-dom');
            
            if (loginForm && registerForm) {
                statusDOM.className = 'status ok';
                statusDOM.textContent = '✓ DOM: Elementos encontrados';
            } else {
                statusDOM.className = 'status error';
                statusDOM.textContent = '✗ DOM: No se encontraron elementos';
            }

            // Funciones
            const statusFunctions = document.getElementById('status-functions');
            const hasFunctions = typeof toggleForms === 'function' && 
                                 typeof testToggle === 'function';
            
            if (hasFunctions) {
                statusFunctions.className = 'status ok';
                statusFunctions.textContent = '✓ Funciones: toggleForms() y testToggle() disponibles';
            } else {
                statusFunctions.className = 'status error';
                statusFunctions.textContent = '✗ Funciones: No disponibles';
            }

            // Formularios
            const statusForms = document.getElementById('status-forms');
            const loginActive = loginForm && loginForm.classList.contains('active');
            const registerActive = registerForm && registerForm.classList.contains('active');
            
            if (loginActive && !registerActive) {
                statusForms.className = 'status ok';
                statusForms.textContent = '✓ Formularios: Login visible, Registro oculto';
            } else if (!loginActive && registerActive) {
                statusForms.className = 'status ok';
                statusForms.textContent = '✓ Formularios: Registro visible, Login oculto';
            } else {
                statusForms.className = 'status error';
                statusForms.textContent = '✗ Formularios: Estado incorrecto';
            }
        }

        // Verificar estado al cargar
        window.addEventListener('DOMContentLoaded', checkStatus);
        
        // Verificar estado cada vez que se hace click
        document.addEventListener('click', () => {
            setTimeout(checkStatus, 100);
        });

        console.log('✓ Test page cargada correctamente');
    </script>
</body>
</html>
