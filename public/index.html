<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Dispositivos ESP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar" id="navbar">
            <div class="nav-content">
                <h1 class="logo">🔌 ESP Manager</h1>
                <div class="nav-links" id="navLinks">
                    <button id="backupBtn" class="btn btn-info" style="display: none; margin-right: 0.5rem;" title="Exportar datos">💾 Backup</button>
                    <button id="logoutBtn" class="btn btn-logout" style="display: none;">Cerrar Sesión</button>
                </div>
            </div>
        </nav>

        <!-- Auth Section -->
        <div id="authSection" class="section">
            <div class="form-container">
                <!-- Login Form -->
                <div id="loginForm" class="form-box active">
                    <h2>Iniciar Sesión</h2>
                    <form id="loginFormElement">
                        <div class="form-group">
                            <label for="loginEmail">Correo Electrónico</label>
                            <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Contraseña</label>
                            <input type="password" id="loginPassword" placeholder="Contraseña" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
                    </form>
                    <p class="toggle-text">¿No tienes cuenta? <a href="javascript:void(0)" onclick="toggleForms(); return false;">Regístrate aquí</a></p>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="form-box">
                    <h2>Crear Cuenta</h2>
                    <form id="registerFormElement">
                        <div class="form-group">
                            <label for="registerUsername">Nombre de Usuario</label>
                            <input type="text" id="registerUsername" placeholder="Tu nombre de usuario" required>
                        </div>
                        <div class="form-group">
                            <label for="registerEmail">Correo Electrónico</label>
                            <input type="email" id="registerEmail" placeholder="tu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Contraseña</label>
                            <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Registrarse</button>
                    </form>
                    <p class="toggle-text">¿Ya tienes cuenta? <a href="javascript:void(0)" onclick="toggleForms(); return false;">Inicia sesión aquí</a></p>
                </div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="section" style="display: none;">
            <div class="dashboard-container">
                <!-- User Info -->
                <div class="user-info">
                    <h2>Bienvenido, <span id="usernameDisplay">Usuario</span></h2>
                    <p id="userEmailDisplay"></p>
                </div>

                <!-- Notas Section -->
                <div class="esp-section">
                    <h3>📝 Mis Notas</h3>
                    <div class="form-container">
                        <form id="notasForm" class="form-box" style="display: block;">
                            <div class="form-group">
                                <label for="notasInput">Agregar Nota:</label>
                                <textarea id="notasInput" placeholder="Escribe aquí tus notas..." rows="4" style="resize: vertical;"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Guardar Nota</button>
                        </form>
                    </div>
                    <div id="notasList" class="notas-list">
                        <p class="empty-message">No hay notas guardadas</p>
                    </div>
                </div>

                <!-- ESP Registration -->
                <div class="esp-section">
                    <h3>Registrar Nuevo ESP</h3>
                    <div class="form-container">
                        <form id="registerESPForm" class="form-box">
                            <div class="form-group">
                                <label for="espKey">Clave Única del ESP</label>
                                <input type="text" id="espKey" placeholder="Ej: ESP32-A1B2C3D4E5" required>
                            </div>
                            <div class="form-group">
                                <label for="espName">Nombre del Dispositivo (Opcional)</label>
                                <input type="text" id="espName" placeholder="Ej: Mi Sensor">
                            </div>
                            <button type="submit" class="btn btn-primary">Registrar ESP</button>
                        </form>
                    </div>
                </div>

                <!-- ESPs List -->
                <div class="esp-section">
                    <h3>Mis Dispositivos ESP</h3>
                    <div class="esp-actions-toolbar">
                        <button class="btn btn-info btn-small" onclick="exportDataAsJSON()" title="Descargar respaldo">📥 Exportar</button>
                        <label class="btn btn-info btn-small" title="Importar respaldo">
                            📤 Importar
                            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importDataFromJSON(this.files[0])">
                        </label>
                    </div>
                    <div id="espsList" class="esps-list">
                        <p class="empty-message">No tienes ESPs registrados</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Messages -->
    <div id="alert" class="alert" style="display: none;"></div>

    <script src="js/main.js"></script>
    <script src="js/backup.js"></script>
</body>
</html>
